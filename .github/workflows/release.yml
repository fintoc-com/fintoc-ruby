name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Tipo de bump'
        type: choice
        required: true
        default: minor
        options: [patch, minor, major]
      release-notes:
        description: 'Release notes (markdown, opcional)'
        type: string
        required: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - run: bundle exec rubocop
      - run: bundle exec rspec

      - uses: fintoc-com/release-action/prepare@main
        id: prep
        with:
          bump: ${{ inputs.bump }}
          version-format: ruby
          tag-prefix: v
          app-id: ${{ vars.FIN_RELEASES_APP_ID }}
          app-private-key: ${{ secrets.FIN_RELEASES_PRIVATE_KEY }}

      - name: Build and push gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          gem build *.gemspec
          gem push *.gem

      - uses: fintoc-com/release-action/finalize@main
        with:
          tag: ${{ steps.prep.outputs.tag }}
          release-notes: ${{ inputs.release-notes }}
          app-id: ${{ vars.FIN_RELEASES_APP_ID }}
          app-private-key: ${{ secrets.FIN_RELEASES_PRIVATE_KEY }}
